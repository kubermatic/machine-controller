presubmits:
  - name: pull-machine-controller-validate-mirror-images
    always_run: false
    run_if_changed: "^pkg/mirror/mirror-images\\.yaml$"
    decorate: true
    clone_uri: "ssh://git@github.com/kubermatic/machine-controller.git"
    path_alias: k8c.io/machine-controller
    spec:
      containers:
        - image: quay.io/kubermatic/build:go-1.25-node-22-8
          command:
            - "./hack/ci/validate-mirror-images.sh"
          resources:
            requests:
              memory: 128Mi
              cpu: 100m

  # TEMPORARY: duplicates post-machine-controller-mirror-images so the job
  # can be validated end-to-end on this PR before merge. Remove before merging.
  #
  # Do not add any preset that injects QUAY_IO_USERNAME or QUAY_IO_PASSWORD
  # here. hack/mirror-images.sh resolves push credentials at runtime and only
  # does so when those variables are unset; pre-populating them with creds
  # scoped to a different organization causes the script to skip credential
  # resolution and push attempts will fail with 403 UNAUTHORIZED.
  - name: pull-machine-controller-mirror-images
    always_run: true
    decorate: true
    clone_uri: "ssh://git@github.com/kubermatic/machine-controller.git"
    path_alias: k8c.io/machine-controller
    labels:
      preset-vault: "true"
      preset-docker-mirror: "true"
    spec:
      containers:
        - image: quay.io/kubermatic/build:go-1.25-node-22-kind-0.30-8
          command:
            - "./hack/mirror-images.sh"
          resources:
            requests:
              memory: 256Mi
              cpu: 200m

  - name: pull-machine-controller-build
    always_run: true
    decorate: true
    clone_uri: "ssh://git@github.com/kubermatic/machine-controller.git"
    path_alias: k8c.io/machine-controller
    labels:
      preset-goproxy: "true"
    spec:
      containers:
        - image: quay.io/kubermatic/build:go-1.25-node-22-8
          command:
            - make
          args:
            - download-gocache
            - all
          resources:
            requests:
              memory: 7Gi
              cpu: 2
            limits:
              memory: 7Gi

  - name: pull-machine-controller-dependencies
    always_run: true
    decorate: true
    clone_uri: "ssh://git@github.com/kubermatic/machine-controller.git"
    path_alias: k8c.io/machine-controller
    labels:
      preset-goproxy: "true"
    spec:
      containers:
        - image: quay.io/kubermatic/build:go-1.25-node-22-8
          command:
            - make
          args:
            - check-dependencies
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m

  - name: pull-machine-controller-lint
    always_run: true
    decorate: true
    clone_uri: "ssh://git@github.com/kubermatic/machine-controller.git"
    path_alias: k8c.io/machine-controller
    labels:
      preset-goproxy: "true"
    spec:
      containers:
        - image: quay.io/kubermatic/build:go-1.25-node-22-8
          command:
            - make
          args:
            - lint
          resources:
            requests:
              cpu: 800m
              memory: 7Gi
            limits:
              memory: 7Gi

  - name: pull-machine-controller-yamllint
    always_run: true
    decorate: true
    clone_uri: "ssh://git@github.com/kubermatic/machine-controller.git"
    path_alias: k8c.io/machine-controller
    labels:
      preset-goproxy: "true"
    spec:
      containers:
        - image: quay.io/kubermatic/build:go-1.25-node-22-8
          command:
            - make
          args:
            - yamllint
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m

  - name: pre-machine-controller-verify-shfmt
    run_if_changed: "^hack/"
    decorate: true
    clone_uri: "ssh://git@github.com/kubermatic/machine-controller.git"
    path_alias: k8c.io/machine-controller
    spec:
      containers:
        - image: quay.io/kubermatic/build:go-1.25-node-22-8
          command:
            - "/usr/local/bin/shfmt"
          args:
            #   -l        list files whose formatting differs from shfmt's
            #   -d        error with a diff when the formatting differs
            #   -i uint   indent: 0 for tabs (default), >0 for number of spaces
            #   -sr       redirect operators will be followed by a space
            - "-l"
            - "-sr"
            - "-i"
            - "2"
            - "-d"
            - "hack"
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m

  - name: pull-machine-controller-verify-boilerplate
    always_run: true
    decorate: true
    clone_uri: "ssh://git@github.com/kubermatic/machine-controller.git"
    path_alias: k8c.io/machine-controller
    spec:
      containers:
        - image: quay.io/kubermatic/build:go-1.25-node-22-8
          command:
            - "./hack/verify-boilerplate.sh"
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m

  - name: pull-machine-controller-license-validation
    run_if_changed: "^go.(mod|sum)$"
    decorate: true
    clone_uri: "ssh://git@github.com/kubermatic/machine-controller.git"
    path_alias: k8c.io/machine-controller
    labels:
      preset-goproxy: "true"
    spec:
      containers:
        - image: quay.io/kubermatic/build:go-1.25-node-22-8
          command:
            - ./hack/verify-licenses.sh
          resources:
            requests:
              memory: 1Gi
              cpu: 1

  - name: pull-machine-controller-test
    always_run: true
    decorate: true
    clone_uri: "ssh://git@github.com/kubermatic/machine-controller.git"
    path_alias: k8c.io/machine-controller
    labels:
      preset-goproxy: "true"
    spec:
      containers:
        - image: quay.io/kubermatic/build:go-1.25-node-22-8
          command:
            - make
          args:
            - download-gocache
            - test-unit
          resources:
            requests:
              cpu: 3
              memory: 7Gi
            limits:
              memory: 7Gi
